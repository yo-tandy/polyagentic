<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyagentic — Sign In</title>
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card" id="login-card">
            <h1 class="login-title">POLYAGENTIC</h1>
            <p class="login-subtitle">Multi-Agent Development System</p>

            <div id="error-message" class="login-error" style="display:none"></div>

            <!-- Step 1: Sign in with Google -->
            <div id="step-login">
                <a href="/auth/google" class="google-btn" id="google-login-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </a>
            </div>

            <!-- Step 2: New user — choose org -->
            <div id="step-signup" style="display:none">
                <p class="login-info">Welcome! Choose how to get started:</p>

                <div class="signup-options">
                    <div class="signup-option" id="option-create">
                        <h3>Create Organization</h3>
                        <p>Start a new team workspace</p>
                        <input type="text" id="org-name-input" placeholder="Organization name"
                               class="login-input" maxlength="200">
                        <button class="login-btn login-btn--primary" id="create-org-btn">
                            Create & Continue
                        </button>
                    </div>

                    <div class="signup-divider">OR</div>

                    <div class="signup-option" id="option-join">
                        <h3>Join Organization</h3>
                        <p>Enter an invite code from your team</p>
                        <input type="text" id="invite-code-input" placeholder="Invite code"
                               class="login-input" maxlength="128">
                        <button class="login-btn login-btn--secondary" id="join-org-btn">
                            Join & Continue
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
